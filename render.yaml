services:
  - type: web
    name: social-engine-pro
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 2
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: GMAIL_ADDRESS
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false